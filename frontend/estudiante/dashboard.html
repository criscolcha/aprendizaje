<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Materias</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
--azul:#003366;
--amarillo:#f2c200;
--gris:#f4f6f9;
}

body{
margin:0;
background:var(--gris);
font-family:Arial;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:var(--azul);
color:white;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2{
font-size:18px;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:10px 0;
padding:10px;
border-radius:8px;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

/* CONTENIDO */
.main{
margin-left:220px;
width:100%;
}

/* HEADER */
.header{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

/* USER */
.user{
background:#f4f6f9;
border:none;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
color:#003366;
}

/* DROPDOWN */
.dropdown-menu{
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* BOTON BACK */
.btn-back{
background:var(--azul);
color:white;
border:none;
padding:6px 15px;
border-radius:8px;
}

.btn-back:hover{
background:#002244;
}

/* BUSCADOR */
.search-box{
max-width:300px;
}

/* TARJETAS */
.card-materia{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:0.3s;
height:100%;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card-materia:hover{
transform:translateY(-5px);
}

.icono{
font-size:30px;
margin-bottom:10px;
}

.badge-custom{
background:var(--azul);
}

.btn-ver{
background:var(--amarillo);
border:none;
border-radius:8px;
font-weight:bold;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Panel Educativo</h2>

<a href="#" style="background:rgba(255,255,255,0.2);">📚 Materias</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">

<div>
<button class="btn-back" onclick="history.back()">← Volver</button>
</div>

<div class="search-box">
<input type="text" id="buscador" class="form-control" placeholder="Buscar materia...">
</div>

<!-- USUARIO -->
<div class="dropdown">
<button class="btn dropdown-toggle user" type="button" data-bs-toggle="dropdown" id="usuarioNombre">
👤 Cargando...
</button>

<ul class="dropdown-menu dropdown-menu-end">

<li><hr class="dropdown-divider"></li>
<li><a class="dropdown-item text-danger" href="#" onclick="logout()">Cerrar sesión</a></li>
</ul>
</div>

</div>

<!-- CONTENIDO -->
<div class="container mt-4">
<div class="row" id="materias"></div>
</div>

</div>

<script>

/* 🔐 PROTEGER RUTA */
const token = localStorage.getItem("token")

if(!token){
window.location.href = "/login.html"
}

/* 👤 MOSTRAR NOMBRE */
const email = localStorage.getItem("nombreUsuario")

let nombre = "Invitado"

if(email){
nombre = email.split("@")[0]
nombre = nombre.charAt(0).toUpperCase() + nombre.slice(1)
}

document.getElementById("usuarioNombre").innerHTML = "👤 " + nombre

/* 🚪 LOGOUT */
function logout(){
localStorage.removeItem("token")
localStorage.removeItem("nombreUsuario")
localStorage.removeItem("role")

window.location.href = "/login.html"
}

/* 📚 MATERIAS */
let materiasGlobal = []

async function cargarMaterias(){

const res = await fetch("/api/courses")
const materias = await res.json()

materiasGlobal = materias
mostrarMaterias(materias)

}

function mostrarMaterias(lista){

const contenedor = document.getElementById("materias")
contenedor.innerHTML=""

lista.forEach(m=>{

contenedor.innerHTML += `

<div class="col-md-4 mb-4">
<div class="card-materia">

<div>
<div class="icono">📘</div>

<h5>${m.nombre}</h5>
<p>${m.descripcion}</p>


</div>

<a href="vermateria.html?id=${m._id}">
<button class="btn btn-ver w-100 mt-3">
Ingresar
</button>
</a>

</div>
</div>

`

})

}

/* 🔍 BUSCADOR */
document.getElementById("buscador").addEventListener("keyup", e=>{

const texto = e.target.value.toLowerCase()

const filtradas = materiasGlobal.filter(m =>
m.nombre.toLowerCase().includes(texto)
)

mostrarMaterias(filtradas)

})

cargarMaterias()

</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
